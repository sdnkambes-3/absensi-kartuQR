<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi - SDN KAMBES 3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --success: #22c55e;
            --danger: #ef4444;
            --bg-dark: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            margin: 0; min-height: 100vh; color: #f8fafc;
            display: flex; flex-direction: column; align-items: center;
        }

        .header { 
            padding: 60px 20px 40px 20px; text-align: center;
        }
        .header h2 { 
            margin: 0; font-weight: 700; font-size: 1.4rem; letter-spacing: -1.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header h3 { 
            margin: 0; font-weight: 720; font-size: 1.5rem; letter-spacing: -1.5px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { opacity: 0.5; font-size: 0.85rem; margin-top: 8px; letter-spacing: 1px; text-transform: uppercase; }

        .container { 
            width: 90%; max-width: 420px; z-index: 10;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .mode-container {
            display: flex; gap: 10px; margin-bottom: 24px;
            background: rgba(0,0,0,0.3); padding: 5px; border-radius: 20px;
        }

        .mode-btn {
            flex: 1; padding: 12px; border: none; border-radius: 16px;
            font-weight: 700; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent; color: #94a3b8; font-size: 12px;
        }

        .mode-btn.active-m { background: var(--primary); color: white; box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .mode-btn.active-p { background: var(--danger); color: white; box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        #reader { 
            width: 100%; border-radius: 24px; overflow: hidden; 
            border: 1px solid var(--glass-border) !important;
        }

        .status-toast {
            display: none; padding: 16px; border-radius: 20px; 
            margin-top: 20px; font-weight: 700; font-size: 13px;
            text-align: center; animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .history-section { margin-top: 40px; width: 100%; }
        .history-title { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 2px; }

        .log-card {
            background: rgba(255,255,255,0.02); padding: 18px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .log-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); }
        
        #reader__dashboard_section_csr button {
            background: var(--primary) !important; color: white !important; 
            border: none !important; padding: 12px 24px !important; 
            border-radius: 14px !important; font-weight: 700 !important;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>ABSEN DIGITAL</h2>
    <h3>SDN KAMPUNG BESAR III</h3>
    <p>Silahkan Scan Kartu QR Anda</p>
</div>

<div class="container">
    <div class="glass-card">
        <div class="mode-container">
            <button id="mBtn" class="mode-btn" onclick="setMode('MASUK')">MASUK</button>
            <button id="pBtn" class="mode-btn" onclick="setMode('PULANG')">PULANG</button>
        </div>
        
        <div id="reader"></div>
        <div id="status" class="status-toast"></div>
    </div>

    <div class="history-section">
        <span class="history-title">History Absen</span>
        <div id="logList"></div>
    </div>
</div>

<script>
    const webAppUrl = "https://script.google.com/macros/s/AKfycbypNOLWfeCeYlLeKh8a2wbi9Q0G7-vSxcJXO3RP5eTzBBsGr0bXuC380Vnj_oE0bjQ/exec"; 
    let currentMode = "";
    let isProcessing = false;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('mBtn').className = 'mode-btn';
        document.getElementById('pBtn').className = 'mode-btn';
        if(mode === 'MASUK') document.getElementById('mBtn').classList.add('active-m');
        else document.getElementById('pBtn').classList.add('active-p');
    }

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        if (!currentMode) {
            alert("Pilih Mode Dulu!");
            return;
        }

        isProcessing = true;
        const status = document.getElementById('status');
        status.style.display = "block";
        status.style.background = "rgba(99, 102, 241, 0.1)";
        status.style.color = "#818cf8";
        status.innerText = "Broadcasting to Node...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => kirimData(decodedText, currentMode, pos.coords.latitude, pos.coords.longitude),
                () => {
                    alert("GPS Wajib Aktif!");
                    isProcessing = false;
                    status.style.display = "none";
                },
                { enableHighAccuracy: true }
            );
        }
    }

    function kirimData(id, tipe, lat, long) {
        const status = document.getElementById('status');
        const finalUrl = `${webAppUrl}?id_user=${encodeURIComponent(id)}&tipe=${encodeURIComponent(tipe)}&lat=${lat}&long=${long}`;

        fetch(finalUrl, { method: 'GET' })
        .then(() => {
            status.style.background = "rgba(34, 197, 94, 0.1)";
            status.style.color = "#4ade80";
            status.innerText = `Verified: ${id}`;
            updateLog(id, currentMode);
            setTimeout(() => { status.style.display = "none"; isProcessing = false; }, 3000);
        })
        .catch(() => {
            status.innerText = "Network Error!";
            isProcessing = false;
        });
    }

    function updateLog(id, mode) {
        const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const color = mode === 'MASUK' ? '#4ade80' : '#f87171';
        const log = `
            <div class="log-card">
                <div>
                    <div style="font-weight:800; font-size:14px; color:#f1f5f9">${id}</div>
                    <div style="font-size:10px; color:#64748b; letter-spacing:1px">${now}</div>
                </div>
                <div style="font-weight:800; font-size:12px; color:${color}">${mode}</div>
            </div>`;
        document.getElementById('logList').innerHTML = log + document.getElementById('logList').innerHTML;
    }

    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 25, qrbox: {width: 220, height: 220}, aspectRatio: 1.0 
    });
    html5QrcodeScanner.render(onScanSuccess);
</script>
</body>
</html>
